<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sonny</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #09111b;
        --bg-elevated: rgba(17, 27, 40, 0.82);
        --line: rgba(255, 255, 255, 0.08);
        --text: #edf3fb;
        --muted: rgba(226, 234, 245, 0.68);
        --accent: #2dd4bf;
        --accent-warm: #fb923c;
        --accent-cool: #60a5fa;
        font-family: "SF Pro Display", "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--text);
        background:
          radial-gradient(circle at top right, rgba(45, 212, 191, 0.12), transparent 30%),
          radial-gradient(circle at bottom left, rgba(96, 165, 250, 0.12), transparent 32%),
          linear-gradient(180deg, #08111b 0%, #0d1725 100%);
      }

      .panel {
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr auto;
      }

      .header {
        padding: 18px 18px 14px;
        border-bottom: 1px solid var(--line);
        background: rgba(8, 14, 24, 0.72);
        backdrop-filter: blur(14px);
      }

      .eyebrow {
        font-size: 11px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .headline {
        margin-top: 8px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
      }

      h1 {
        margin: 0;
        font-size: 22px;
        font-weight: 640;
      }

      .header-actions {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .status {
        --status-glow: rgba(148, 163, 184, 0.12);
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: var(--bg-elevated);
        font-size: 12px;
        color: var(--muted);
        box-shadow: 0 0 0 1px var(--status-glow);
        transition:
          border-color 180ms ease,
          background-color 180ms ease,
          box-shadow 180ms ease;
      }

      .status[data-status="listening"] {
        border-color: rgba(45, 212, 191, 0.22);
        background: rgba(17, 27, 40, 0.94);
        box-shadow:
          0 0 0 1px var(--status-glow),
          0 12px 28px rgba(9, 17, 27, 0.22);
      }

      .status[data-status="thinking"] {
        border-color: rgba(251, 146, 60, 0.22);
      }

      .status[data-status="speaking"] {
        border-color: rgba(96, 165, 250, 0.22);
      }

      .voice-toggle {
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        border-radius: 999px;
        padding: 8px 12px;
        font: inherit;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        transition:
          border-color 140ms ease,
          background-color 140ms ease,
          transform 140ms ease;
      }

      .voice-toggle:hover:not(:disabled) {
        border-color: rgba(45, 212, 191, 0.32);
        transform: translateY(-1px);
      }

      .voice-toggle-enabled {
        background: rgba(45, 212, 191, 0.12);
        color: #d7fffa;
      }

      .voice-toggle:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      .status-wave {
        width: 18px;
        height: 14px;
        display: inline-flex;
        align-items: end;
        gap: 2px;
      }

      .status-bar {
        width: 3px;
        height: 100%;
        border-radius: 999px;
        background: currentColor;
        opacity: 0.34;
        transform-origin: center bottom;
        transition:
          opacity 180ms ease,
          transform 180ms ease,
          background-color 180ms ease;
      }

      .status[data-status="idle"] .status-bar {
        height: 6px;
        opacity: 0.26;
      }

      .status[data-status="listening"] .status-bar {
        opacity: 0.92;
        background: var(--accent);
        animation: waveform 1s ease-in-out infinite;
      }

      .status[data-status="listening"] .status-bar:nth-child(2) {
        animation-delay: 120ms;
      }

      .status[data-status="listening"] .status-bar:nth-child(3) {
        animation-delay: 240ms;
      }

      .status[data-status="listening"] .status-bar:nth-child(4) {
        animation-delay: 360ms;
      }

      .status[data-status="thinking"] .status-bar {
        height: 10px;
        opacity: 0.8;
        background: var(--accent-warm);
      }

      .status[data-status="speaking"] .status-bar {
        height: 12px;
        opacity: 0.84;
        background: var(--accent-cool);
      }

      .conversation {
        padding: 16px 18px;
        overflow: auto;
        display: grid;
        align-content: start;
        gap: 12px;
      }

      .empty {
        margin-top: 30px;
        padding: 18px;
        border-radius: 18px;
        border: 1px dashed rgba(255, 255, 255, 0.12);
        color: var(--muted);
        background: rgba(255, 255, 255, 0.03);
      }

      .message {
        max-width: 92%;
        padding: 12px 14px;
        border-radius: 18px;
        line-height: 1.42;
        font-size: 13px;
        white-space: pre-wrap;
        position: relative;
      }

      .message-content {
        display: inline;
      }

      .message-enter {
        animation: message-enter 260ms cubic-bezier(0.2, 0.8, 0.2, 1);
      }

      .message::after {
        content: attr(data-timestamp);
        position: absolute;
        left: 14px;
        bottom: calc(100% + 8px);
        padding: 5px 8px;
        border-radius: 10px;
        font-size: 11px;
        line-height: 1;
        color: var(--text);
        background: rgba(6, 12, 20, 0.94);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.22);
        opacity: 0;
        pointer-events: none;
        transform: translateY(4px);
        transition:
          opacity 140ms ease,
          transform 140ms ease;
      }

      .message:hover::after {
        opacity: 1;
        transform: translateY(0);
      }

      .message-user {
        justify-self: end;
        background: linear-gradient(135deg, rgba(45, 212, 191, 0.2), rgba(24, 38, 52, 0.92));
        border-bottom-right-radius: 6px;
      }

      .message-user::after {
        left: auto;
        right: 14px;
      }

      .message-assistant {
        justify-self: start;
        background: linear-gradient(135deg, rgba(96, 165, 250, 0.14), rgba(17, 27, 40, 0.92));
        border-bottom-left-radius: 6px;
      }

      .stream-cursor {
        display: inline-block;
        width: 8px;
        height: 1.05em;
        margin-left: 2px;
        vertical-align: text-bottom;
        border-radius: 999px;
        background: rgba(237, 243, 251, 0.88);
        animation: stream-cursor-blink 1s steps(1, end) infinite;
      }

      @keyframes stream-cursor-blink {
        0%, 49% {
          opacity: 1;
        }

        50%, 100% {
          opacity: 0;
        }
      }

      .typing-indicator {
        justify-self: start;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 12px 14px;
        border-radius: 18px;
        border-bottom-left-radius: 6px;
        background: linear-gradient(135deg, rgba(96, 165, 250, 0.1), rgba(17, 27, 40, 0.92));
      }

      .typing-dot {
        width: 7px;
        height: 7px;
        border-radius: 999px;
        background: rgba(237, 243, 251, 0.82);
        animation: typing-pulse 900ms ease-in-out infinite;
      }

      .typing-dot:nth-child(2) {
        animation-delay: 120ms;
      }

      .typing-dot:nth-child(3) {
        animation-delay: 240ms;
      }

      @keyframes typing-pulse {
        0%, 80%, 100% {
          opacity: 0.28;
          transform: translateY(0);
        }

        40% {
          opacity: 1;
          transform: translateY(-2px);
        }
      }

      @keyframes waveform {
        0%, 100% {
          transform: scaleY(0.35);
        }

        30% {
          transform: scaleY(1);
        }

        60% {
          transform: scaleY(0.56);
        }
      }

      @keyframes message-enter {
        from {
          opacity: 0;
          transform: translateY(10px) scale(0.985);
        }

        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      .composer {
        padding: 14px 18px 18px;
        border-top: 1px solid var(--line);
        background: rgba(8, 14, 24, 0.72);
        backdrop-filter: blur(14px);
      }

      .composer-form {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        align-items: end;
      }

      .composer-input {
        width: 100%;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        border-radius: 16px;
        padding: 12px 14px;
        font: inherit;
        line-height: 1.42;
        outline: none;
        resize: none;
        min-height: 48px;
        max-height: 132px;
        overflow-y: auto;
      }

      .composer-input:focus {
        border-color: rgba(45, 212, 191, 0.45);
        box-shadow: 0 0 0 4px rgba(45, 212, 191, 0.1);
      }

      .composer-button {
        border: 0;
        border-radius: 16px;
        padding: 0 16px;
        min-width: 84px;
        background: linear-gradient(135deg, #2dd4bf, #60a5fa);
        color: #08111b;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      .composer-button:disabled {
        cursor: wait;
        opacity: 0.7;
      }

      .composer-meta {
        margin-top: 8px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        font-size: 11px;
        color: var(--muted);
      }

      .composer-shortcut {
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.04);
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <header class="header">
        <div class="eyebrow">Local-first assistant</div>
        <div class="headline">
          <h1>Sonny</h1>
          <div class="header-actions">
            <button class="voice-toggle" id="voice-toggle" type="button">Voice Off</button>
            <div class="status" id="status-chip" aria-live="polite" data-status="idle">
              <span class="status-wave" aria-hidden="true">
                <span class="status-bar"></span>
                <span class="status-bar"></span>
                <span class="status-bar"></span>
                <span class="status-bar"></span>
              </span>
              <span id="status-label">Ready</span>
            </div>
          </div>
        </div>
      </header>

      <main class="conversation" id="conversation" aria-live="polite"></main>

      <footer class="composer">
        <form class="composer-form" id="composer-form">
          <textarea
            id="composer-input"
            class="composer-input"
            name="message"
            autocomplete="off"
            placeholder="Ask something useful."
            rows="1"
          ></textarea>
          <button class="composer-button" id="composer-button" type="submit">Send</button>
        </form>
        <div class="composer-meta">
          <span>Enter adds a line break.</span>
          <span class="composer-shortcut">Cmd+Enter to send</span>
        </div>
      </footer>
    </div>

    <script type="module" src="./panel.js"></script>
  </body>
</html>
